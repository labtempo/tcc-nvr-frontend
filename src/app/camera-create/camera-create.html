<div class="form-page">
  <div class="form-container glass-panel">
    <div class="form-header">
      <h2 class="form-title">Nova Câmera</h2>
      <p class="form-subtitle">Adicione uma nova fonte de vídeo ao sistema</p>
    </div>

    <form (ngSubmit)="onCreateCamera()">

      <!-- Nome -->
      <div class="form-group">
        <label class="form-label" for="name">Nome da Câmera</label>
        <input id="name" type="text" class="form-input" [(ngModel)]="camera.name" name="name"
          placeholder="Ex: Câmera Portaria" required autocomplete="off">
      </div>

      <!-- RTSP URL -->
      <div class="form-group">
        <label class="form-label" for="rtsp_url">URL RTSP (Alta Qualidade)</label>
        <input id="rtsp_url" type="text" class="form-input monospace" [(ngModel)]="camera.rtsp_url" name="rtsp_url"
          placeholder="rtsp://admin:pass@192.168.1.10:554/stream" required autocomplete="off">
      </div>

      <!-- RTSP URL Low -->
      <div class="form-group">
        <label class="form-label" for="rtsp_url_low">URL RTSP (Baixa Qualidade) <span
            style="color: #94a3b8; font-weight: normal;">(Opcional)</span></label>
        <input id="rtsp_url_low" type="text" class="form-input monospace" [(ngModel)]="camera.rtsp_url_low"
          name="rtsp_url_low" placeholder="rtsp://admin:pass@192.168.1.10:554/stream_low" autocomplete="off">
        <span class="form-desc" style="font-size: 0.85rem; color: #94a3b8; margin-top: 0.5rem; display: block;">Se
          disponível, para transmissão em menor resolução</span>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button type="button" class="btn-ghost" [routerLink]="['/cameras']">Cancelar</button>
        <button type="submit" class="btn-primary">Salvar Câmera</button>
      </div>

    </form>
  </div>
</div>
